<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>TrackServer Hub</title>
    <link rel="icon" type="image/svg+xml" href="/hub/favicon.svg" />
    <style>html,body{background:#080a10;margin:0}</style>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('hub_theme') === 'light' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', t);
          if (t === 'light') document.documentElement.style.background = '#f1f5f9';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
