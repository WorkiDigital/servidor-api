server {
    listen 80;
    server_name localhost;

    location /hub/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /hub/index.html;
    }

    location = /hub {
        return 301 /hub/;
    }

    location / {
        return 301 /hub/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
